<!DOCTYPE html>
<html>
<head>
<title>Pseudo Class</title>

<style>
p {
    display: none;
    background-color: darkgray;
    padding: 20px;
}

div:hover p {
    display: block;
}

a:hover{
    color:red;
}
</style>

</head>

<body>

<div>
Letakkan kursor disini untuk melihat div elemet
<p>Saya adalah element p</p>
</div>

<br><br>

<a href="#">Arahkan mouse kesini</a>

</body>
</html>
