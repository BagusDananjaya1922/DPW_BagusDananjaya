<!DOCTYPE html>
<html>
<head>
<title>belajar Simple selektor</title>

<style>
p {
    text-align: center;
    color: aqua;
}

#kalimat {
    text-align: left;
    color: red;
}

.center { 
    text-align: center;
    color: chocolate;
}

p.tengah {
    text-align: center;
    color: darkmagenta;
    display: block;
    background-color: #777777;
}

p{
    border:2px solid black;
    padding:10px;
}
</style>

</head>

<body>

<p id="kalimat">
Penggunaan CSS sangat membantu web designer dalam menyusun halaman yang konsisten pada proyek pembuatan halaman web.
</p>

<p class="center">
CSS memungkinkan penulisan CSS dengan sederhana namun powerful dalam design web.
</p>

<p class="tengah">
CSS memungkinkan penulisan CSS dengan sederhana namun powerful dalam design web.
</p>

</body>
</html>
