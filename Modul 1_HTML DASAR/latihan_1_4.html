<!DOCTYPE html>
<html>
    <head>
    <title>Halaman HTML saya</title>
    <link rel="icon" type="img/png" href="gambar/icon.png" sizes="16x16" />
    <meta charset="UTF-8">
    <meta name="description" content="Belajar membuat HTML">
    <meta name="keywords" content="Heading dan paragraf">
    <meta name="author" content="Bagus Dananjaya">
    </head>

    <body>
        <!--Order List-->
        <ol type="1">
            <li>Jenis Buah :</li>
            <li>Jenis Makanan :</li>
            <li>Gander :</li>
        </ol>

        <!--Unordared List-->
        <ul>
            <li>Apel</li>
            <li>Nanas</li>
            <li>Jeruk</li>
            <li>Anggur</li>
        </ul>

        <!--Nested List-->
        <ol type="1">
            <li >Jenis Buah :
                <ul>
                    <li>Apel</li>
                    <li>Nanas</li>
                </ul>
            </li>
            <li>Jenis Makanan :</li>
            <ol>
                <li>Nasi Goreng</li>
                <li>Nasi Pecel</li>
                <li>Soto Ayam</li>
            </ol>
            <li>Gender :</li>
            <ol type="A">
                <li>Laki Laki</li>
                <li>Perempuan</li>
            </ol>
            
        </ol>
    </body>
</html>
